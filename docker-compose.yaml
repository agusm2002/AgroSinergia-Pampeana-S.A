services:
  postgres:
    image: postgres:16-alpine
    container_name: agrosinergia_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: agrosinergia
      POSTGRES_USER: agrosinergia
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agrosinergia -d agrosinergia"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agrosinergia_network

  backend:
    build:
      context: ./nestjs_backend
      dockerfile: Dockerfile
    container_name: agrosinergia_backend
    restart: unless-stopped
    environment:
      PORT: 3001
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: agrosinergia
      POSTGRES_USER: agrosinergia
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${BACKEND_HOST_PORT:-3011}:3001"
    networks:
      - agrosinergia_network

  frontend:
    build:
      context: ./nextjs_frontend
      dockerfile: Dockerfile
    container_name: agrosinergia_frontend
    restart: unless-stopped
    environment:
      AGRO_API_URL: http://backend:3001
      PORT: 3000
    depends_on:
      backend:
        condition: service_started
    ports:
      - "3000:3000"
    networks:
      - agrosinergia_network

  refine:
    build:
      context: ./refine_control_panel/admin-panel
      dockerfile: Dockerfile
    container_name: agrosinergia_refine
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: /api
      INTERNAL_API_URL: http://backend:3001
      PORT: 3000
    depends_on:
      backend:
        condition: service_started
    ports:
      - "3002:3000"
    networks:
      - agrosinergia_network

volumes:
  postgres_data:

networks:
  agrosinergia_network:
    driver: bridge
