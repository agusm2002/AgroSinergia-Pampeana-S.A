name: Pull Request Validation

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - develop
      - main

permissions:
  contents: read

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (${{ matrix.project }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: backend
            working_directory: nestjs_backend
            install_flags: ""
            lint_command: npx eslint "{src,apps,libs,test}/**/*.ts"
          - project: frontend
            working_directory: nextjs_frontend
            install_flags: ""
            lint_command: npm run lint
          - project: admin
            working_directory: refine_control_panel/admin-panel
            install_flags: --legacy-peer-deps
            lint_command: npm run lint

    defaults:
      run:
        working-directory: ${{ matrix.working_directory }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.working_directory }}/package-lock.json

      - name: Install dependencies
        run: npm ci ${{ matrix.install_flags }}

      - name: Run lint
        run: ${{ matrix.lint_command }}

  tests:
    name: Tests (backend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nestjs_backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: nestjs_backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --runInBand

  build:
    name: Build (${{ matrix.project }})
    runs-on: ubuntu-latest
    needs: [lint, tests]
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: backend
            working_directory: nestjs_backend
            install_flags: ""
            build_command: npm run build
          - project: frontend
            working_directory: nextjs_frontend
            install_flags: ""
            build_command: npm run build
          - project: admin
            working_directory: refine_control_panel/admin-panel
            install_flags: --legacy-peer-deps
            build_command: npm run build

    defaults:
      run:
        working-directory: ${{ matrix.working_directory }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.working_directory }}/package-lock.json

      - name: Install dependencies
        run: npm ci ${{ matrix.install_flags }}

      - name: Build project
        run: ${{ matrix.build_command }}

  docker-build-and-push:
    name: Docker Build & Push (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [lint, tests, build]
    if: ${{ github.event.pull_request.head.repo.fork == false && github.event.pull_request.draft == false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: ./nestjs_backend
            dockerfile: ./nestjs_backend/Dockerfile
          - service: frontend
            context: ./nextjs_frontend
            dockerfile: ./nextjs_frontend/Dockerfile
          - service: refine
            context: ./refine_control_panel/admin-panel
            dockerfile: ./refine_control_panel/admin-panel/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve image tags
        id: vars
        run: |
          TARGET_ENV=$([ "${{ github.base_ref }}" = "main" ] && echo "production" || echo "staging")
          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE_TAG_IMMUTABLE="${TARGET_ENV}-pr-${{ github.event.pull_request.number }}-${SHORT_SHA}"
          IMAGE_TAG_CHANNEL="${TARGET_ENV}-pr-${{ github.event.pull_request.number }}"

          NAMESPACE='${{ secrets.DOCKERHUB_NAMESPACE }}'
          if [ -z "$NAMESPACE" ]; then
            NAMESPACE='${{ secrets.DOCKERHUB_USERNAME }}'
          fi

          IMAGE_NAME="${NAMESPACE}/agrosinergia-${{ matrix.service }}"

          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "tag_immutable=${IMAGE_TAG_IMMUTABLE}" >> "$GITHUB_OUTPUT"
          echo "tag_channel=${IMAGE_TAG_CHANNEL}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ steps.vars.outputs.image_name }}:${{ steps.vars.outputs.tag_immutable }}
            ${{ steps.vars.outputs.image_name }}:${{ steps.vars.outputs.tag_channel }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

